version: '3.8'

services:
  jpos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jpos-switch
    ports:
      - "10000:10000"
      - "9999:9999"
      - "8080:8080"
    environment:
      - CMS_SERVICE_URL=http://cms-service:8082/api/transaction
      - CMS_INTERNAL_API_KEY=jpos-to-cms-secret-key-2025
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  pos-ui:
    build:
      context: ./pos-ui
      dockerfile: Dockerfile
    container_name: pos-ui
    ports:
      - "3000:3000"
    environment:
      - JPOS_HOST=jpos
      - JPOS_PORT=10000
    restart: unless-stopped
    depends_on:
      - jpos
